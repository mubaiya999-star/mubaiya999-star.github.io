<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        body {
            background-color: #add8e6; /* Light blue theme */
            font-family: Arial, sans-serif;
        }
        header {
            text-align: center;
            padding: 20px;
        }
        nav {
            margin: 20px 0;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #000;
        }
        section {
            margin: 50px;
        }
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: float 4s infinite;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }
        .lottery {
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Portfolio</h1>
        <nav>
            <a href="#about">About</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
            <a href="#lottery">Lottery Game</a>
        </nav>
    </header>
    
    <section id="about">
        <h2>About</h2>
        <p>This is a brief description about myself.</p>
    </section>
    
    <section id="projects">
        <h2>Projects</h2>
        <p>Here is a list of my projects.</p>
    </section>
    
    <section id="contact">
        <h2>Contact</h2>
        <p>You can contact me through my email.</p>
    </section>
    
    <section id="lottery">
        <div class="lottery">
            <h2>Lottery Drawing Game</h2>
            <button onclick="drawLottery()">Draw Lottery</button>
            <p id="lotteryResult"></p>
        </div>
    </section>
    
    <div class="stars"></div>
    
    <script>
        function drawLottery() {
            const result = Math.floor(Math.random() * 100) + 1; // Random number between 1-100
            document.getElementById("lotteryResult").innerText = "Your lottery number is: " + result;
        }
        
        // Create floating stars
        for (let i = 0; i < 50; i++) {
            let star = document.createElement("div");
            star.classList.add("star");
            star.style.width = Math.random() * 3 + "px"; // Random size
            star.style.height = star.style.width; // Keep it circular
            star.style.left = Math.random() * 100 + "vw"; // Random horizontal position
            star.style.top = Math.random() * 100 + "vh"; // Random vertical position
            star.style.opacity = Math.random(); // Random opacity
            document.querySelector(".stars").appendChild(star);
        }
    </script>
</body>
</html>
